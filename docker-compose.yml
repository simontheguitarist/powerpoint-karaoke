services:
  app:
    build: .
    image: powerpoint-karaoke:latest
    container_name: pk
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # REQUIRED — set to a long random string
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      # Public URL of the app (used for OAuth callbacks + cookies)
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Comma-separated origins that better-auth will accept POSTs from
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000}
      # Optional — leave empty to hide the "Continue with Google" button
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - pk_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pk_data:
